<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | مفتاح السعادة</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>

    <style>
        :root {
            --primary-color: #0B6FFB;
            --secondary-color: #0f172a;
            --primary-gradient: linear-gradient(135deg, #0B6FFB, #3b82f6);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #f8fafc;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(11, 111, 251, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(11, 111, 251, 0.08) 0%, transparent 50%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }

        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 50px;
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 100%;
            max-width: 480px;
            border: 1px solid #f1f5f9;
        }

        .logo-text { font-size: 1.8rem; font-weight: 900; color: #1e293b; margin-bottom: 20px; text-decoration: none; display: flex; justify-content: center; align-items: center; }
        .logo-text img { max-height: 80px; width: auto; }
        .logo-text span { color: var(--primary-color); }

        .card-desc { color: #64748b; font-weight: 600; margin-bottom: 40px; }

        .form-group { margin-bottom: 25px; text-align: right; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 800; color: #1e293b; font-size: 0.95rem; }
        
        .form-control {
            width: 100%;
            padding: 18px 22px;
            border: 2px solid #f1f5f9;
            border-radius: 18px;
            background: #f8fafc;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            background: white;
            outline: none;
            box-shadow: 0 0 0 5px rgba(11, 111, 251, 0.08);
        }

        .btn-login {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-size: 1.15rem;
            font-weight: 900;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
            box-shadow: 0 15px 35px rgba(11, 111, 251, 0.25);
        }

        .btn-login:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 45px var(--primary-color-shadow, rgba(11, 111, 251, 0.35));
        }

        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }

        .error-msg {
            background: rgba(239, 68, 68, 0.05);
            color: #ef4444;
            padding: 15px;
            border-radius: 15px;
            margin-top: 25px;
            display: none;
            font-weight: 700;
            font-size: 0.95rem;
            border: 1px solid rgba(239, 68, 68, 0.1);
        }

        .auth-footer {
            margin-top: 35px;
            padding-top: 30px;
            border-top: 1px solid #f1f5f9;
        }

        .auth-footer p { color: #64748b; margin-bottom: 15px; font-weight: 600; }
        .auth-footer a { color: var(--primary-color); text-decoration: none; font-weight: 800; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 25px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }
        .back-link:hover { color: #1e293b; transform: translateX(-5px); }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="login-card">
            <a href="index.html" class="logo-text" id="site-logo-name">
                Miftah <span>Saada</span>
            </a>
            <p class="card-desc" id="login-card-desc">مرحباً بك مجدداً في متجر مفتاح السعادة</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login" id="submitBtn">
                    تسجيل الدخول <i class="fas fa-sign-in-alt"></i>
                </button>
                <div id="errorMsg" class="error-msg"></div>
            </form>

            <div class="auth-footer">
                <p>ليس لديك حساب؟ <a href="register.html">أنشئ حساباً جديداً</a></p>
                <a href="index.html" class="back-link">
                    <i class="fas fa-long-arrow-alt-right"></i> العودة للمتجر
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorMsg');

            if (!window.supabaseClient) {
                alert("يرجى ربط Supabase أولاً.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'جاري التحقق... <i class="fas fa-spinner fa-spin"></i>';
            errorDiv.style.display = 'none';

            try {
                const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                const ADMIN_EMAIL = 'raymoweb1@gmail.com';
                if (data.user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }

            } catch (err) {
                errorDiv.textContent = "بيانات الدخول غير صحيحة أو الحساب غير مفعل.";
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'تسجيل الدخول <i class="fas fa-sign-in-alt"></i>';
            }
        });
    </script>
    <script src="js/main.js"></script>
</body>
</html>
