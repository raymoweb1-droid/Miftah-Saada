<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | مفتاح السعادة</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>

</head>
<body>

    <div class="auth-wrapper">
        <div class="login-card">
            <a href="index.html" class="logo-text" id="site-logo-name">
                Miftah <span>Saada</span>
            </a>
            <p class="card-desc" id="login-card-desc">مرحباً بك مجدداً في متجر مفتاح السعادة</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login" id="submitBtn">
                    تسجيل الدخول <i class="fas fa-sign-in-alt"></i>
                </button>
                <div id="errorMsg" class="error-msg"></div>
            </form>



            <div class="auth-footer">
                <p>ليس لديك حساب؟ <a href="register.html">أنشئ حساباً جديداً</a></p>
                <a href="index.html" class="back-link">
                    <i class="fas fa-long-arrow-alt-right"></i> العودة للمتجر
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorMsg');

            if (!window.supabaseClient) {
                alert("يرجى ربط Supabase أولاً.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'جاري التحقق... <i class="fas fa-spinner fa-spin"></i>';
            errorDiv.style.display = 'none';

            try {
                const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                const ADMIN_EMAIL = 'raymoweb1@gmail.com';
                if (data.user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }

            } catch (err) {
                errorDiv.textContent = "بيانات الدخول غير صحيحة أو الحساب غير مفعل.";
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'تسجيل الدخول <i class="fas fa-sign-in-alt"></i>';
            }
        });
    </script>
    <script src="js/main.js"></script>
    <!-- WhatsApp Button -->
    <a href="https://wa.me/212635939690" class="whatsapp-float" id="whatsapp-float-btn" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>
</body>
</html>
