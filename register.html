<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد | مفتاح السعادة</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>

</head>
<body>

    <div class="auth-wrapper">
        <div class="register-card">
            <a href="index.html" class="logo-text" id="site-logo-name">
                Miftah <span>Saada</span>
            </a>
            <p class="card-desc" id="register-card-desc">إنشاء حساب جديد للانضمام إلينا</p>

            <form id="registerForm">
                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="name" class="form-control" placeholder="أدخل اسمك الكامل" required>
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="phone" class="form-control" placeholder="+212 6XXXXXXXX" dir="ltr" style="text-align: right;" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" class="form-control" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="checkbox-group" onclick="document.getElementById('marketing').click()">
                    <input type="checkbox" id="marketing" checked onclick="event.stopPropagation()">
                    <label for="marketing">
                        أوافق على استلام تنبيهات حصرية عبر الواتساب أو الإيميل عند وصول منتجات جديدة وتخفيضات خاصة.
                    </label>
                </div>

                <button type="submit" class="btn-register" id="submitBtn">
                    إنشاء حسابي الآن <i class="fas fa-user-plus"></i>
                </button>
                
                <div id="errorMsg" class="error-msg"></div>
                <div id="successMsg" class="success-msg">تم تسجيلك بنجاح! جاري تحويلك... <i class="fas fa-spinner fa-spin"></i></div>
            </form>

            <div class="auth-footer">
                <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
                <a href="index.html" class="back-link">
                    <i class="fas fa-long-arrow-alt-right"></i> العودة للمتجر
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const optIn = document.getElementById('marketing').checked;

            const btn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');

            if (!window.supabaseClient) {
                alert("يرجى ربط Supabase أولاً.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'جاري الإنشاء... <i class="fas fa-spinner fa-spin"></i>';
            errorDiv.style.display = 'none';

            try {
                const { data, error } = await window.supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: name,
                            phone: phone,
                            marketing_opt_in: optIn
                        }
                    }
                });

                if (error) throw error;
                
                // --- CUSTOMER DATA CAPTURE ---
                // Corrected column names to match Supabase schema (name, phone, email)
                await window.supabaseClient.from('customers').insert([{
                    name: name,
                    phone: phone,
                    email: email,
                    created_at: new Date().toISOString()
                }]);

                successDiv.style.display = 'block';
                btn.style.display = 'none';
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);

            } catch (err) {
                errorDiv.textContent = err.message || "حدث خطأ أثناء التسجيل.";
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'إنشاء حسابي الآن <i class="fas fa-user-plus"></i>';
            }
        });
    </script>
    <script src="js/main.js"></script>
    <!-- WhatsApp Button -->
    <a href="https://wa.me/212635939690" class="whatsapp-float" id="whatsapp-float-btn" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>
</body>
</html>
